<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0b;
    --bg2: #0f1210;
    --bg3: #161a16;
    --border: #2a332c;
    --border2: #344038;
    --accent: #a3f7b5;
    --accent-dim: #86efac;
    --accent-muted: #2d6b47;
    --accent-glow: rgba(163, 247, 181, 0.10);
    --text: #f0f5f1;
    --text-dim: #c0d4c5;
    --text-muted: #7a9880;
    --yellow: #fde68a;
    --red: #fca5a5;
    --blue: #93c5fd;
    /* syntax colors — fixed across all themes */
    --syn-base: #f0f5f1;
    --syn-sub: #93c5fd;
    --syn-flag: #a3f7b5;
    --syn-arg: #fde68a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  /* ── THEMES ── */
  [data-theme="amber"] {
    --bg: #0c0a06;
    --bg2: #131008;
    --bg3: #1a160a;
    --border: #332d1a;
    --border2: #40380f;
    --accent: #fcd34d;
    --accent-dim: #f59e0b;
    --accent-muted: #6b4e00;
    --accent-glow: rgba(252, 211, 77, 0.10);
    --text: #fdf8e7;
    --text-dim: #d4c48a;
    --text-muted: #8a7a40;
  }

  [data-theme="arctic"] {
    --bg: #060a0f;
    --bg2: #090f18;
    --bg3: #0f1820;
    --border: #1a2a3a;
    --border2: #1e3448;
    --accent: #7dd3fc;
    --accent-dim: #38bdf8;
    --accent-muted: #0c3a5c;
    --accent-glow: rgba(125, 211, 252, 0.10);
    --text: #e8f4fd;
    --text-dim: #a0c4d8;
    --text-muted: #4a7a94;
  }

  [data-theme="rose"] {
    --bg: #0c080a;
    --bg2: #120a0e;
    --bg3: #1a0f14;
    --border: #3a1a24;
    --border2: #4a1f2e;
    --accent: #fda4af;
    --accent-dim: #fb7185;
    --accent-muted: #6b1a2a;
    --accent-glow: rgba(253, 164, 175, 0.10);
    --text: #fdf0f2;
    --text-dim: #d4a0aa;
    --text-muted: #8a5060;
  }

  [data-theme="slate"] {
    --bg: #08080f;
    --bg2: #0d0d18;
    --bg3: #131320;
    --border: #252538;
    --border2: #2e2e48;
    --accent: #c4b5fd;
    --accent-dim: #a78bfa;
    --accent-muted: #3b2f6b;
    --accent-glow: rgba(196, 181, 253, 0.10);
    --text: #f0effe;
    --text-dim: #b8b0d8;
    --text-muted: #6a6090;
  }

  /* ── LIGHT THEMES ── */
  [data-theme="light"] {
    --bg: #f5f7f5;
    --bg2: #ffffff;
    --bg3: #edf2ed;
    --border: #ccdacc;
    --border2: #b8ccb8;
    --accent: #16803c;
    --accent-dim: #15803d;
    --accent-muted: #bbf7d0;
    --accent-glow: rgba(22, 128, 60, 0.08);
    --text: #0f1f10;
    --text-dim: #2d4a30;
    --text-muted: #5a7a5c;
    --syn-base: #0f1f10;
    --syn-sub: #1d4ed8;
    --syn-flag: #16803c;
    --syn-arg: #b45309;
  }

  [data-theme="light-amber"] {
    --bg: #fdf8ed;
    --bg2: #fffdf5;
    --bg3: #f5edda;
    --border: #e0d0a0;
    --border2: #ccbc88;
    --accent: #b45309;
    --accent-dim: #92400e;
    --accent-muted: #fde68a;
    --accent-glow: rgba(180, 83, 9, 0.08);
    --text: #1c1208;
    --text-dim: #3d2808;
    --text-muted: #7a5a20;
    --syn-base: #1c1208;
    --syn-sub: #1d4ed8;
    --syn-flag: #b45309;
    --syn-arg: #6d28d9;
  }

  [data-theme="light-arctic"] {
    --bg: #f0f7ff;
    --bg2: #ffffff;
    --bg3: #e4f0fc;
    --border: #bcd8f0;
    --border2: #a0c8e8;
    --accent: #0369a1;
    --accent-dim: #0284c7;
    --accent-muted: #bae6fd;
    --accent-glow: rgba(3, 105, 161, 0.08);
    --text: #0a1628;
    --text-dim: #1e3a54;
    --text-muted: #4a7a9a;
    --syn-base: #0a1628;
    --syn-sub: #0369a1;
    --syn-flag: #0e7490;
    --syn-arg: #b45309;
  }

  [data-theme="light-rose"] {
    --bg: #fff5f6;
    --bg2: #ffffff;
    --bg3: #ffe8eb;
    --border: #f0c0c8;
    --border2: #e0a0aa;
    --accent: #be123c;
    --accent-dim: #e11d48;
    --accent-muted: #fecdd3;
    --accent-glow: rgba(190, 18, 60, 0.08);
    --text: #1c080c;
    --text-dim: #3d1020;
    --text-muted: #8a4050;
    --syn-base: #1c080c;
    --syn-sub: #1d4ed8;
    --syn-flag: #be123c;
    --syn-arg: #b45309;
  }

  [data-theme="light-slate"] {
    --bg: #f4f3ff;
    --bg2: #ffffff;
    --bg3: #ebe8ff;
    --border: #c8c0f0;
    --border2: #b0a8e0;
    --accent: #5b21b6;
    --accent-dim: #6d28d9;
    --accent-muted: #ddd6fe;
    --accent-glow: rgba(91, 33, 182, 0.08);
    --text: #0f0a1e;
    --text-dim: #2a1a4a;
    --text-muted: #6050a0;
    --syn-base: #0f0a1e;
    --syn-sub: #1d4ed8;
    --syn-flag: #5b21b6;
    --syn-arg: #b45309;
  }

  /* ── SETTINGS PAGE ── */
  .settings-page {
    padding: 28px;
    max-width: 600px;
  }

  .settings-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .settings-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-bottom: 28px;
  }

  .settings-section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .theme-swatch {
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .theme-swatch:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .theme-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .swatch-preview {
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
  }

  .swatch-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .swatch-line {
    height: 2px;
    border-radius: 1px;
    flex: 1;
    opacity: 0.5;
  }

  .swatch-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 6px 12px;
    background: var(--bg2);
    text-align: center;
  }

  /* ── GEAR ICON ── */
  .gear-btn {
    position: fixed;
    bottom: 20px;
    left: 14px;
    width: 32px;
    height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--text-muted);
    transition: all 0.15s;
    z-index: 10;
  }

  .gear-btn:hover {
    color: var(--accent);
    border-color: var(--accent-muted);
    background: var(--accent-glow);
  }

  .gear-btn.active {
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--text-dim);
    font-weight: 300;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .sidebar-section {
    padding: 16px 12px 8px;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--text-dim);
    font-size: 13px;
    font-family: var(--sans);
  }

  .tool-btn:hover {
    background: var(--bg3);
    color: var(--text);
    border-color: var(--border);
  }

  .tool-btn.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  .tool-icon {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 20px;
    text-align: center;
  }

  .tool-btn.active .tool-icon {
    color: var(--accent-dim);
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 12px;
  }

  .sidebar-section.workflows {
    flex: 1;
    overflow-y: auto;
  }

  .workflow-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.4;
  }

  .workflow-item:hover {
    background: var(--bg3);
    color: var(--text-dim);
  }

  .workflow-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-top: 6px;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 1;
  }

  /* ── SEARCH BAR ── */
  .search-area {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .search-prefix {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    padding: 12px 0 12px 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-right: none;
    border-radius: 8px 0 0 8px;
    line-height: 1;
  }

  #search-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: none;
    border-right: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input::placeholder {
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 14px;
  }

  #search-input:focus {
    border-color: var(--accent-muted);
  }

  #search-input:focus + .search-suffix,
  #search-input:focus ~ .search-prefix {
    border-color: var(--accent-muted);
  }

  .search-suffix {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: none;
    border-radius: 0 8px 8px 0;
    padding: 8px 12px;
    display: flex;
    align-items: center;
  }

  .search-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 5px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .search-btn:hover {
    background: var(--accent-dim);
  }

  .clear-btn {
    background: transparent;
    color: #f87171;
    border: 1px solid #7f2e2e;
    margin-left: 6px;
  }

  .clear-btn:hover {
    background: rgba(248, 113, 113, 0.15);
    color: #fca5a5;
    border-color: #f87171;
  }

  .search-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
    font-family: var(--mono);
    display: flex;
    gap: 20px;
  }

  .hint-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .hint-tag span {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ── CLARIFICATION POP-UP ── */
  .clarify-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .clarify-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .clarify-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 24px;
    width: 360px;
    transform: translateY(8px);
    transition: transform 0.2s;
  }

  .clarify-overlay.visible .clarify-box {
    transform: translateY(0);
  }

  .clarify-question {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .clarify-query {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 18px;
    font-weight: 500;
  }

  .clarify-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .clarify-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg3);
  }

  .clarify-opt:hover {
    border-color: var(--accent-muted);
    background: var(--accent-glow);
    color: var(--accent);
  }

  .clarify-opt-icon {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text-muted);
    width: 24px;
    text-align: center;
  }

  .clarify-opt:hover .clarify-opt-icon {
    color: var(--accent);
  }

  .clarify-opt-label {
    font-size: 14px;
    font-weight: 500;
  }

  /* ── CONTENT AREA ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    opacity: 0.6;
  }

  .empty-terminal {
    font-family: var(--mono);
    font-size: 48px;
    color: var(--accent);
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-title {
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
    line-height: 1.8;
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 16px;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── RESPONSE CARDS ── */
  .response-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    max-width: 800px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .card-title-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-tool-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--accent-muted);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .card-badges {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fresh-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(251, 191, 36, 0.1);
    color: var(--yellow);
    border: 1px solid rgba(251, 191, 36, 0.2);
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .type-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Command card body */
  .card-body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Command block */
  .command-block {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
  }

  .command-block-footer {
    display: flex;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
  }

  .copy-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover {
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  .copy-btn.copied {
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  .command-text {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent);
    padding: 14px 16px;
    word-break: break-all;
    line-height: 1.5;
    cursor: pointer;
    transition: background 0.15s;
  }

  .command-text:hover {
    background: var(--accent-glow);
  }

  .command-text .clickable-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .command-block:hover .clickable-hint {
    opacity: 1;
  }

  /* Breakdown */
  .breakdown-section {
    display: none;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .breakdown-section.open {
    display: flex;
  }

  .breakdown-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .breakdown-row:last-child {
    border-bottom: none;
  }

  .breakdown-row:hover {
    background: var(--bg3);
  }

  .breakdown-part {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    padding: 10px 14px;
    min-width: 160px;
    border-right: 1px solid var(--border);
    word-break: break-all;
  }

  .breakdown-explanation {
    font-size: 13px;
    color: var(--text-dim);
    padding: 10px 14px;
    line-height: 1.5;
  }

  .breakdown-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
    background: none;
    border: none;
    margin-left: 2px;
  }

  .breakdown-toggle:hover {
    color: var(--accent);
  }

  .toggle-arrow {
    transition: transform 0.2s;
    display: inline-block;
  }

  .breakdown-toggle.open .toggle-arrow {
    transform: rotate(90deg);
  }

  /* Example */
  .example-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .example-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }

  .example-command {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--blue);
    padding: 10px 14px;
  }

  .example-context {
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 14px 10px;
    line-height: 1.5;
  }

  /* Warning */
  .warning-block {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(248, 113, 113, 0.05);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .warning-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .warning-text {
    font-size: 13px;
    color: var(--red);
    line-height: 1.5;
  }

  /* ── WORKFLOW CARD ── */
  .workflow-description {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .step-item {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .step-item:last-child {
    border-bottom: none;
  }

  .step-main {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    cursor: pointer;
  }

  .step-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .step-check:hover {
    border-color: var(--accent-dim);
  }

  .step-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .step-check.checked::after {
    content: '✓';
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
  }

  .step-content {
    flex: 1;
    min-width: 0;
  }

  .step-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }

  .step-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .step-item.completed .step-title {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .step-command-group {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }

  .step-command-preview {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .step-command-preview:hover {
    border-color: var(--accent-muted);
    color: var(--accent-dim);
  }

  .step-explanation {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 4px;
  }

  .step-expand {
    border-top: 1px solid var(--border);
    padding: 12px 16px 12px 48px;
    background: var(--bg);
    display: none;
  }

  .step-expand.open {
    display: block;
  }

  .step-expand-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .step-breakdown {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .step-breakdown .breakdown-row {
    background: var(--bg2);
  }

  .step-copy-full {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .step-copy-full:hover {
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  .step-warning {
    margin-top: 8px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: rgba(248, 113, 113, 0.05);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
  }


  /* ── CHEAT SHEETS ── */
  .cheatsheets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    padding: 4px 2px;
  }

  .cheatsheet-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: fadeUp 0.3s ease;
  }

  .cheatsheet-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .cheatsheet-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .cheatsheet-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .cheatsheet-commands {
    display: flex;
    flex-direction: column;
  }

  .cs-command-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .cs-command-row:last-child {
    border-bottom: none;
  }

  .cs-command-row:hover {
    background: var(--bg3);
  }

  .cs-command-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    gap: 12px;
  }

  .cs-command-text {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    flex: 1;
  }

  .cs-command-desc {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    flex-shrink: 0;
    max-width: 180px;
  }

  .cs-output {
    display: none;
    padding: 10px 16px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .cs-output.open {
    display: block;
  }

  .cs-output-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .cs-output-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .cs-copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .cs-copy-btn:hover {
    color: var(--accent);
    border-color: var(--accent-muted);
  }

  .platform-toggle {
    display: flex;
    margin: 2px 10px 6px 32px;
    border: 1px solid var(--border2);
    border-radius: 5px;
    overflow: hidden;
  }

  .platform-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 0;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .platform-btn:first-child {
    border-right: 1px solid var(--border2);
  }

  .platform-btn:hover {
    color: var(--text-dim);
    background: var(--bg3);
  }

  .platform-btn.active {
    background: var(--accent-muted);
    color: var(--accent);
  }

  /* ── CLAUDE CODE TIPS ── */
  .tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 4px 2px;
  }

  .tip-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    animation: fadeUp 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tip-card:hover {
    border-color: var(--border2);
  }

  .tip-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tip-category {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--bg3);
    color: var(--text-muted);
    border: 1px solid var(--border2);
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .tip-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .tip-body {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .tip-command {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 2px;
  }

  .tip-command-text {
    flex: 1;
    word-break: break-all;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-text">Dev<span>Brain</span></div>
    <div class="logo-sub">// developer tools reference</div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Tools</div>
    <button class="tool-btn active" data-tool="all" onclick="selectTool(this, 'all')">
      <span class="tool-icon">⬡</span> All Tools
    </button>
    <button class="tool-btn" data-tool="git" onclick="selectTool(this, 'git')">
      <span class="tool-icon">⎇</span> Git
    </button>
    <div class="platform-toggle" id="platform-toggle">
      <button class="platform-btn active" id="btn-github" onclick="setPlatform('github')">GitHub</button>
      <button class="platform-btn" id="btn-gitlab" onclick="setPlatform('gitlab')">GitLab</button>
    </div>
    <button class="tool-btn" data-tool="docker" onclick="selectTool(this, 'docker')">
      <span class="tool-icon">⬡</span> Docker
    </button>
    <button class="tool-btn" data-tool="vscode" onclick="selectTool(this, 'vscode')">
      <span class="tool-icon">❮❯</span> VS Code / Cursor
    </button>
    <button class="tool-btn" data-tool="terminal" onclick="selectTool(this, 'terminal')">
      <span class="tool-icon">$</span> Terminal
    </button>
    <button class="tool-btn" data-tool="python" onclick="selectTool(this, 'python')">
      <span class="tool-icon">🐍</span> Python
    </button>
    <button class="tool-btn" data-tool="node" onclick="selectTool(this, 'node')">
      <span class="tool-icon">⬡</span> Node / npm
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <div class="sidebar-label">Reference</div>
    <button class="tool-btn" id="cheatsheet-nav-btn" onclick="showCheatSheets(this)">
      <span class="tool-icon">≡</span> Cheat Sheets
    </button>
    <button class="tool-btn" id="claudecode-nav-btn" onclick="showClaudeCodeTips(this)">
      <span class="tool-icon">✦</span> Claude Code Tips
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section workflows">
    <div class="sidebar-label">Workflows</div>
    <div id="workflow-list"></div>
  </div>
</aside>

<!-- GEAR BUTTON -->
<button class="gear-btn" id="gear-btn" onclick="showSettings(this)" title="Settings">⚙</button>

<!-- MAIN -->
<main class="main">
  <div class="search-area">
    <div class="search-wrap">
      <span class="search-prefix">›</span>
      <input type="text" id="search-input"
        placeholder="What are you trying to do? (e.g. undo my last commit)"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="search-suffix">
        <button class="search-btn" onclick="submitQuery()">ask</button>
        <button class="search-btn clear-btn" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="search-hint">
      <span class="hint-tag"><span>Enter</span> to search</span>
      <span class="hint-tag"><span>↑↓</span> history</span>
      <span class="hint-tag">click any command to expand</span>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <div class="empty-terminal">&gt;_</div>
      <div class="empty-title">Ask anything about your dev tools</div>
      <div class="empty-sub">
        "how do I undo a commit"<br>
        "set up a new Python project"<br>
        "what does docker-compose up do"
      </div>
    </div>
  </div>
</main>

<!-- CLARIFICATION OVERLAY -->
<div class="clarify-overlay" id="clarify-overlay">
  <div class="clarify-box">
    <div class="clarify-question">What are you looking for?</div>
    <div class="clarify-query" id="clarify-query-text"></div>
    <div class="clarify-options" id="clarify-options"></div>
  </div>
</div>

<script>
let currentTool = 'all';
let pendingQuery = '';
let queryHistory = [];
let historyIndex = -1;
let gitPlatform = 'github';

// ── PLATFORM TOGGLE ──
function setPlatform(platform) {
  gitPlatform = platform;
  document.getElementById('btn-github').classList.toggle('active', platform === 'github');
  document.getElementById('btn-gitlab').classList.toggle('active', platform === 'gitlab');

  // If cheat sheets are currently showing, re-render them immediately
  if (document.getElementById('cheatsheet-nav-btn').classList.contains('active')) {
    showCheatSheets(document.getElementById('cheatsheet-nav-btn'));
  }
}

// ── TOOL SELECTION ──
function selectTool(btn, tool) {
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('gear-btn').classList.remove('active');
  btn.classList.add('active');
  currentTool = tool;
  document.querySelector('.search-area').style.display = '';
  document.getElementById('content').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-terminal">&gt;_</div>
      <div class="empty-title">Ask anything about your dev tools</div>
      <div class="empty-sub">
        "how do I undo a commit"<br>
        "set up a new Python project"<br>
        "what does docker-compose up do"
      </div>
    </div>
  `;
  loadWorkflows(tool);
}

// ── WORKFLOW SIDEBAR ──
async function loadWorkflows(tool) {
  const res = await fetch('/api/workflows');
  const data = await res.json();
  const list = document.getElementById('workflow-list');
  list.innerHTML = '';

  const toolsToShow = tool === 'all' ? Object.keys(data) : [tool];
  
  toolsToShow.forEach(t => {
    if (!data[t]) return;
    if (tool === 'all') {
      const label = document.createElement('div');
      label.className = 'sidebar-label';
      label.style.marginTop = '10px';
      label.textContent = t.toUpperCase();
      list.appendChild(label);
    }
    data[t].forEach(wf => {
      const item = document.createElement('div');
      item.className = 'workflow-item';
      item.innerHTML = `<span class="workflow-dot"></span>${wf}`;
      item.onclick = () => {
        document.getElementById('search-input').value = wf;
        submitQuery();
      };
      list.appendChild(item);
    });
  });
}

// ── SEARCH ──
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuery();
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < queryHistory.length - 1) {
      historyIndex++;
      document.getElementById('search-input').value = queryHistory[historyIndex];
    }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      document.getElementById('search-input').value = queryHistory[historyIndex];
    } else {
      historyIndex = -1;
      document.getElementById('search-input').value = '';
    }
  }
});

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
}

async function submitQuery(intentOverride) {
  const query = intentOverride 
    ? pendingQuery 
    : document.getElementById('search-input').value.trim();
  
  if (!query) return;

  // Add to history
  if (!intentOverride) {
    queryHistory.unshift(query);
    historyIndex = -1;
    pendingQuery = query;
  }

  // Check for clarification needed
  if (!intentOverride) {
    const clarifyRes = await fetch('/api/clarify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query })
    });
    const clarifyData = await clarifyRes.json();

    if (clarifyData.needs_clarification) {
      showClarify(query, clarifyData.options);
      return;
    }
  }

  showLoading();

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ 
        query,
        intent: intentOverride || null,
        tool: currentTool !== 'all' ? currentTool : null,
        platform: gitPlatform
      })
    });
    const data = await res.json();
    
    if (data.error) {
      showError(data.error);
      return;
    }

    if (data.type === 'workflow') {
      renderWorkflow(data);
    } else if (data.type === 'analyze') {
      renderAnalyze(data);
    } else {
      renderCommand(data);
    }
  } catch (err) {
    showError('Could not connect to the server. Is Flask running?');
  }
}

// ── CLARIFY OVERLAY ──
function showClarify(query, options) {
  document.getElementById('clarify-query-text').textContent = `"${query}"`;
  const optContainer = document.getElementById('clarify-options');
  optContainer.innerHTML = '';

  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'clarify-opt';
    btn.innerHTML = `
      <span class="clarify-opt-icon">${opt.icon}</span>
      <span class="clarify-opt-label">${opt.label}</span>
    `;
    btn.onclick = () => {
      hideClarify();
      submitQuery(opt.intent);
    };
    optContainer.appendChild(btn);
  });

  document.getElementById('clarify-overlay').classList.add('visible');
}

function hideClarify() {
  document.getElementById('clarify-overlay').classList.remove('visible');
}

document.getElementById('clarify-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) hideClarify();
});

// ── LOADING ──
function showLoading() {
  document.getElementById('empty-state') && 
    (document.getElementById('empty-state').style.display = 'none');
  document.getElementById('content').innerHTML = `
    <div class="loading-state">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="loading-text">querying devbrain...</div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div style="padding:20px; color: var(--red); font-family: var(--mono); font-size:13px;">
      ✗ ${msg}
    </div>
  `;
}

// ── RENDER COMMAND ──
function renderCommand(data) {
  const fresh = !data.from_cache;
  const breakdownId = 'bd-' + Math.random().toString(36).slice(2);

  const html = `
    <div class="response-card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="card-tool-badge">${data.tool || 'dev'}</span>
          <span class="card-title">${data.title}</span>
        </div>
        <div class="card-badges">
          ${fresh ? '<span class="fresh-badge">✦ freshly generated</span>' : ''}
          <span class="type-badge">&gt;_ command</span>
        </div>
      </div>
      <div class="card-body">
        <div class="command-block">
          <div class="command-text" onclick="toggleBreakdown('${breakdownId}', this)">
            ${colorizeCommand(data.command)}
            <span class="clickable-hint">← click to explain</span>
          </div>
          <div class="command-block-footer">
            <button class="copy-btn" onclick="copyCommand(this, '${escapeJs(data.command)}')">copy</button>
          </div>
        </div>

        <button class="breakdown-toggle" id="toggle-${breakdownId}" onclick="toggleBreakdown('${breakdownId}', null)">
          <span class="toggle-arrow">›</span> explain each part
        </button>

        <div class="breakdown-section" id="${breakdownId}">
          ${data.breakdown.map(b => `
            <div class="breakdown-row">
              <div class="breakdown-part">${escapeHtml(b.part)}</div>
              <div class="breakdown-explanation">${escapeHtml(b.explanation)}</div>
            </div>
          `).join('')}
        </div>

        <div class="example-block">
          <div class="example-label">Real Example</div>
          <div class="example-command">${colorizeCommand(data.example.command)}</div>
          <div class="example-context">${escapeHtml(data.example.context)}</div>

        ${data.warning ? `
          <div class="warning-block">
            <span class="warning-icon">⚠</span>
            <span class="warning-text">${escapeHtml(data.warning)}</span>
          </div>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

      <div class="card-header">

// ── INTERACTIONS ──
function toggleBreakdown(id, commandEl) {
  const section = document.getElementById(id);
  const toggle = document.getElementById('toggle-' + id);
  const isOpen = section.classList.contains('open');

  section.classList.toggle('open', !isOpen);
  if (toggle) toggle.classList.toggle('open', !isOpen);
}

function toggleStepExpand(id, e) {
  e.stopPropagation();
  const section = document.getElementById(id);
  section.classList.toggle('open');
}

function toggleStep(i) {
  const check = document.getElementById('check-' + i);
  const item = document.getElementById('step-item-' + i);
  check.classList.toggle('checked');
  item.classList.toggle('completed');
}

function copyCommand(btn, command) {
  navigator.clipboard.writeText(command);
  const orig = btn.textContent;
  btn.textContent = 'copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('copied');
  }, 1500);
}

// ── UTILS ──
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeJs(str) {
  if (!str) return '';
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// ── COMMAND COLORIZER ──
function colorizeCommand(cmd) {
  const tokens = cmd.match(/(".*?"|'.*?'|`.*?`|\S+)/g);
  if (!tokens) return escapeHtml(cmd);

  return tokens.map((token, i) => {
    const escaped = escapeHtml(token);
    // First token = base command (git, docker, python3, etc.)
    if (i === 0) {
      return `<span style="color:var(--syn-base)">${escaped}</span>`;
    }
    // Flags: start with - or --
    if (token.startsWith('-')) {
      return `<span style="color:var(--syn-flag)">${escaped}</span>`;
    }
    // Quoted strings
    if ((token.startsWith('"') && token.endsWith('"')) ||
        (token.startsWith("'") && token.endsWith("'"))) {
      return `<span style="color:var(--syn-arg)">${escaped}</span>`;
    }
    // Second token = subcommand (commit, push, init, etc.)
    if (i === 1) {
      return `<span style="color:var(--syn-sub)">${escaped}</span>`;
    }
    // Remaining arguments (branch names, remotes, paths)
    return `<span style="color:var(--syn-arg)">${escaped}</span>`;
  }).join(' ');
}

    { id: "slate",        name: "Slate",   bg: "#08080f", accent: "#c4b5fd", border: "#252538" }
  ],
  light: [
    { id: "light",        name: "Light",   bg: "#f5f7f5", accent: "#16803c", border: "#ccdacc" },
    { id: "light-amber",  name: "Amber",   bg: "#fdf8ed", accent: "#b45309", border: "#e0d0a0" },
    { id: "light-arctic", name: "Arctic",  bg: "#f0f7ff", accent: "#0369a1", border: "#bcd8f0" },
    { id: "light-rose",   name: "Rose",    bg: "#fff5f6", accent: "#be123c", border: "#f0c0c8" },
    { id: "light-slate",  name: "Slate",   bg: "#f4f3ff", accent: "#5b21b6", border: "#c8c0f0" }
  ]
};

function applyTheme(themeId) {
  document.documentElement.setAttribute('data-theme', themeId === 'default' ? '' : themeId);
  localStorage.setItem('devbrain-theme', themeId);
}

function showSettings(btn) {
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.search-area').style.display = 'none';
  document.getElementById('gear-btn').classList.add('active');

  const savedTheme = localStorage.getItem('devbrain-theme') || 'default';

  function swatchHtml(theme) {
    return `
      <div class="theme-swatch ${savedTheme === theme.id ? 'active' : ''}"
           id="swatch-${theme.id}"
           onclick="selectTheme('${theme.id}')">
        <div class="swatch-preview" style="background:${theme.bg}">
          <div class="swatch-dot" style="background:${theme.accent}"></div>
          <div class="swatch-line" style="background:${theme.accent}"></div>
          <div class="swatch-dot" style="background:${theme.border}; width:5px; height:5px;"></div>
        </div>
        <div class="swatch-label" style="background:${theme.bg}; color:${theme.accent}; border-top: 1px solid ${theme.border};">
          ${theme.name}
        </div>
      </div>
    `;
  }

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="settings-page">
      <div class="settings-title">Settings</div>
      <div class="settings-sub">// preferences and customization</div>

      <div class="settings-section-label">Dark themes</div>
      <div class="theme-grid" style="margin-bottom: 24px;">
        ${THEMES.dark.map(swatchHtml).join('')}
      </div>

      <div class="settings-section-label">Light themes</div>
      <div class="theme-grid">
        ${THEMES.light.map(swatchHtml).join('')}
      </div>
    </div>
  `;
}

function selectTheme(themeId) {
  applyTheme(themeId);
  // Update active swatch
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('swatch-' + themeId)?.classList.add('active');
}

// ── INIT ──
// Load saved theme
const savedTheme = localStorage.getItem('devbrain-theme') || 'default';
applyTheme(savedTheme);
// Restore search bar when a tool is selected
loadWorkflows('all');
document.getElementById('search-input').focus();
</script>
